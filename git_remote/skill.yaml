name: git_remote
skill_type: executable
description: Atomic git remote configuration manager with connectivity validation.

inputs:
  action:
    type: string
    required: true
    enum: [add, remove, set_url, rename, get]
    description: "The remote operation to perform."
  name:
    type: string
    default: "origin"
    description: "The name of the remote."
  url:
    type: string
    description: "The remote repository URL (required for add and set_url)."
  new_name:
    type: string
    description: "The new name for the remote (required for rename)."

config:
  timeout_seconds: 15
  validate_connectivity: true

output_contract:
  status: "success | already_exists | not_found | invalid_url | auth_error | not_repo | error"
  remotes: array
  current_url: string
  validation:
    connected: boolean
    error: string
  summary: string
