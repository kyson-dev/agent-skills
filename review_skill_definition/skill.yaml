name: review_skill_definition
version: 1.0.0
status: experimental
skill_type: executable

description: >
  Foundational gatekeeper for skill engineering quality.
  Reviews naming, 3-file architecture, output contracts, safety,
  completeness, and maintainability.

owner: kyson
side_effects: none
default_mode: ci

inputs:
  mode:
    type: string
    required: false
    default: ci
    enum: [ci, interactive]
  skill_name:
    type: string
    required: true
  skill_type:
    type: string
    required: false
    default: ""
    description: "executable | knowledge | orchestrator"
  skill_yaml:
    type: string
    required: true
  prompt_md:
    type: string
    required: true
  skill_md:
    type: string
    required: true

outputs:
  review_json:
    type: object

config:
  naming_pattern: "snake_case (must match directory name)"
  yaml_max_block_lines: 30
  yaml_max_nesting: 3
  required_identity_fields:
    - name
    - version
    - status
    - skill_type
    - description
    - owner
    - side_effects

rubric:
  total_score: 100
  scoring_criteria:
    architecture:
      weight: 30
      description: "3-file separation: data in YAML, logic in prompt, docs in SKILL.md"
    safety:
      weight: 20
      description: "Side effects declared accurately; unsafe operations gated"
    output_contract:
      weight: 15
      description: "Output contract consistent across all three files"
    completeness:
      weight: 15
      description: "All required identity/input/output fields present and well-defined"
    maintainability:
      weight: 10
      description: "YAML block size, nesting depth, config restrictions, section order"
    naming:
      weight: 10
      description: "Name follows config.naming_pattern convention"

verdict_rules:
  pass: { min_score: 85 }
  revise: { min_score: 60 }
  reject: { below: 60 }

output_contract:
  required_fields:
    - score
    - verdict
    - risk_level
    - dimension_scores
    - issues
    - suggestions
    - recommended_changes
  verdict_enum: [pass, revise, reject]
  risk_level_enum: [low, medium, high]
  issue_fields: [dimension_id, severity, file, evidence, fix_hint]
  severity_enum: [low, medium, high, critical]
  suggestion_fields: [dimension_id, priority, file, action, expected_change]
  priority_enum: [p0, p1, p2]
  recommended_changes_fields: [skill_yaml_patch, prompt_patch, skill_md_patch]
