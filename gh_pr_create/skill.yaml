name: gh_pr_create
skill_type: executable
description: Atomic GitHub PR creator with automatic body synthesis from commits and safety pre-flights.

inputs:
  remote:
    type: string
    default: "origin"
    description: "The name of the remote to use for repository identity."
  base:
    type: string
    default: "main"
    description: "The branch you want your changes pulled into."
  title:
    type: string
    description: "PR title. If empty, uses the last commit subject or synthesizes one."
  body:
    type: string
    description: "PR description. If empty, auto-summarizes commits into a structured format."
  draft:
    type: boolean
    default: false
    description: "Whether to create the PR as a draft."
  maintainer_can_modify:
    type: boolean
    default: true
    description: "Whether maintainers can modify the pull request."

config:
  # Debug switch: When true, include the merged configuration in output.
  debug_effective_config: false
  require_pushed_state: true
  auto_generate_body: true
  max_commits_to_summarize: 15
  timeout_seconds: 30
  # Conventional PR Standards
  allowed_types: ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
  body_sections: ["## Description", "## Key Changes", "## Impact & Risk"]

output_contract:
  status: "success | not_pushed | conflict | already_exists | error"
  pr_number: number
  html_url: string
  diff_url: string
  base_branch: string
  head_branch: string
  summary: string
  debug_fields: [effective_config]
