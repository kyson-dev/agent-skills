name: git_status
version: 1.0.0
status: experimental
skill_type: executable

description: >
  Read-only git repository state inspector. Produces a normalized snapshot
  of current branch state (ahead/behind), file buckets, in-progress operations, 
  prioritized next actions, and hygiene/security pre-checks.

owner: kyson
side_effects: none
default_mode: full

inputs:
  mode:
    type: string
    required: false
    default: full
    enum: [brief, full]
    description: >
      brief: include counts and capped file lists.
      full: include full details up to configured caps.
  include_untracked:
    type: boolean
    required: false
    default: true
    description: "Whether to include untracked files in counts and file buckets."
  max_files_per_bucket:
    type: integer
    required: false
    default: 50
    description: "Upper cap per file bucket in output."

outputs:
  status_result:
    type: object

config:
  # Debug switch: When true, include the merged configuration in output.
  debug_effective_config: false
  max_files_per_bucket_limit: 200
  brief_mode_bucket_cap: 20
  detect_in_progress_states: true
  include_ignored_files: false
  # Branch role configuration
  protected_branches: ["main", "master", "production", "prod"]
  # Patterns for hygiene checks
  sensitive_patterns: [".env", "*.pem", "id_rsa", ".DS_Store", "node_modules", "venv", ".python-version"]
  # Patterns for security checks
  secret_patterns: ["sk-[a-zA-Z0-9]{20,}", "ghp_[a-zA-Z0-9]{20,}", "AIza[a-zA-Z0-9_\\-]{35}", "xox[pb]-[0-9]{12}-[a-zA-Z0-9]{24}"]

status_rules:
  not_repo:
    when_not_inside_work_tree: true
  conflicted:
    when_conflicted_files_gt: 0
  dirty:
    when_total_changes_gt: 0
  clean:
    when_total_changes_eq: 0

risk_rules:
  - id: detached_head
    severity: high
  - id: merge_in_progress
    severity: high
  - id: rebase_in_progress
    severity: high
  - id: cherry_pick_in_progress
    severity: medium
  - id: conflicts_present
    severity: high
  - id: upstream_behind
    severity: medium
  - id: upstream_ahead_unpushed
    severity: low
  - id: no_remotes
    severity: low
  - id: missing_gitignore
    severity: medium
  - id: sensitive_files_exposed
    severity: high
  - id: potential_secrets_leak
    severity: critical
  - id: work_on_protected_branch
    severity: low

output_contract:
  required_fields:
    - status
    - repo_path
    - branch
    - is_protected
    - upstream
    - ahead_behind
    - in_progress
    - counts
    - files
    - remotes
    - risks
    - next_actions
    - summary
  status_enum: [not_repo, clean, dirty, conflicted]
  ahead_behind_fields: [ahead, behind]
  in_progress_fields: [merge, rebase, cherry_pick, bisect, detached_head]
  counts_fields: [staged, unstaged, untracked, conflicted, total]
  files_fields: [staged, unstaged, untracked, conflicted]
  risk_fields: [id, severity, evidence]
  severity_enum: [low, medium, high, critical]
  next_action_fields: [id, priority, action, reason]
  priority_enum: [p0, p1, p2]
  debug_fields: [effective_config]
